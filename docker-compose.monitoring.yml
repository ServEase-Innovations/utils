# Host ports 9204 / 3204 / 3124 — scrape main utils HTTP on 3030 (see monitoring/prometheus/prometheus.yml).

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: utils-prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9204:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    container_name: utils-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3124:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    container_name: utils-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/utils:ro
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: utils-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3204:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
